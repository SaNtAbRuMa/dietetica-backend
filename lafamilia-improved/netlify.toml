[build]
  command   = "npm run build"
  publish   = "dist"

# Redirigir todas las rutas al index.html (necesario para SPA con hash routing)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache largo para assets de Vite (tienen hash en el nombre)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
