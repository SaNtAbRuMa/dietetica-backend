[build]
  command   = "npm run build"
  publish   = "dist"

# ── Catálogo desde Google Sheets ────────────────────────────────────────────
# Este redirect intercepta /api/products ANTES del catch-all de la SPA
# y lo redirige a la función serverless que lee Google Sheets.
# IMPORTANTE: debe estar ANTES del redirect /* para tener prioridad.
[[redirects]]
  from   = "/api/products"
  to     = "/.netlify/functions/products"
  status = 200

# ── SPA: redirigir todas las demás rutas al index.html ──────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache largo para assets de Vite (tienen hash en el nombre)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
